<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Irwin Backorder Report</title>
<style>
:root{--bg:#0f1117;--surf:#1a1d27;--surf2:#22263a;--bdr:#2e3350;--red:#e8533a;--org:#f0a045;--grn:#3cb97a;--txt:#e8eaf0;--mut:#7a8099;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:system-ui,sans-serif;font-size:13px;}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

.topbar{display:flex;align-items:center;gap:10px;padding:0 16px;height:50px;background:var(--surf);border-bottom:1px solid var(--bdr);flex-shrink:0;}
.logo{font-weight:800;font-size:14px;letter-spacing:.5px;flex-shrink:0;}
.logo span{color:var(--red);}
.spacer{flex:1;}
.date-badge{font-size:11px;color:var(--mut);background:var(--surf2);border-radius:5px;padding:3px 9px;}
.upload-link{font-size:11px;color:var(--mut);text-decoration:none;padding:4px 10px;border:1px solid var(--bdr);border-radius:5px;}
.upload-link:hover{color:var(--txt);border-color:var(--mut);}

/* FILTERS */
.filters{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:8px 14px;background:var(--surf);border-bottom:1px solid var(--bdr);flex-shrink:0;}
.fl{font-size:10px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;}

/* MULTI-SELECT */
.ms-wrap{position:relative;display:inline-block;}
.ms-trigger{display:flex;align-items:center;gap:4px;background:var(--surf2);border:1px solid var(--bdr);color:var(--txt);border-radius:5px;padding:4px 8px;font-size:11px;cursor:pointer;white-space:nowrap;min-width:70px;user-select:none;}
.ms-trigger:hover{border-color:var(--mut);}
.ms-trigger.has-filter{border-color:var(--red);color:var(--txt);}
.ms-trigger .ms-arrow{margin-left:auto;color:var(--mut);font-size:9px;}
.ms-panel{display:none;position:absolute;top:calc(100% + 3px);left:0;min-width:200px;max-height:280px;background:var(--surf);border:1px solid var(--bdr);border-radius:8px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.5);flex-direction:column;}
.ms-panel.show{display:flex;}
.ms-searchbox{padding:8px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.ms-searchbox input{width:100%;background:var(--surf2);border:1px solid var(--bdr);color:var(--txt);border-radius:4px;padding:3px 8px;font-size:11px;outline:none;}
.ms-searchbox input:focus{border-color:var(--red);}
.ms-links{display:flex;gap:10px;padding:5px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.ms-link{font-size:10px;color:var(--mut);cursor:pointer;text-decoration:underline;}
.ms-link:hover{color:var(--txt);}
.ms-list{overflow-y:auto;max-height:200px;}
.ms-item{display:flex;align-items:center;gap:8px;padding:5px 10px;cursor:pointer;font-size:11px;}
.ms-item:hover{background:var(--surf2);}
.ms-item input{accent-color:var(--red);width:13px;height:13px;flex-shrink:0;cursor:pointer;}
.ms-item label{flex:1;cursor:pointer;user-select:none;}
.ms-none{padding:10px;color:var(--mut);font-size:11px;text-align:center;}

select.native,input[type=text]{background:var(--surf2);border:1px solid var(--bdr);color:var(--txt);border-radius:5px;padding:4px 8px;font-size:11px;outline:none;}
select.native:focus,input:focus{border-color:var(--red);}
input[type=text]{width:150px;}
.btn{padding:4px 11px;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:600;transition:opacity .15s;}
.btn:hover{opacity:.82;}
.btn-s{background:var(--surf2);color:var(--mut);border:1px solid var(--bdr);}
.btn-grn{background:var(--grn);color:#fff;}
.btn-p{background:var(--red);color:#fff;}
.btn-sm{padding:3px 9px;font-size:10px;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px 14px;flex-shrink:0;}
.sc{background:var(--surf);border:1px solid var(--bdr);border-radius:8px;padding:10px 13px;}
.sc .lbl{font-size:9px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.sc .val{font-size:21px;font-weight:800;line-height:1;}
.sc .sub{font-size:9px;color:var(--mut);margin-top:2px;}
.c-red{color:var(--red);}.c-org{color:var(--org);}.c-grn{color:var(--grn);}.c-wht{color:var(--txt);}

/* BODY */
.body{display:flex;flex:1;overflow:hidden;}
.pivot{width:260px;flex-shrink:0;overflow-y:auto;background:var(--surf);border-right:1px solid var(--bdr);}
.ph{padding:8px 13px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--surf);z-index:5;display:flex;justify-content:space-between;}
.cr{border-bottom:1px solid var(--bdr);}
.cn{display:flex;align-items:center;gap:5px;padding:8px 13px;cursor:pointer;font-weight:600;font-size:11px;transition:background .1s;user-select:none;}
.cn:hover{background:var(--surf2);}
.cn.act{background:var(--surf2);color:var(--red);}
.chv{font-size:8px;color:var(--mut);margin-left:auto;transition:transform .15s;flex-shrink:0;}
.chv.open{transform:rotate(90deg);}
.proj-list{display:none;}
.proj-list.open{display:block;}
.pr{padding:5px 10px 5px 22px;cursor:pointer;font-size:11px;color:var(--mut);border-top:1px solid var(--bdr);display:flex;align-items:center;gap:5px;transition:background .1s;}
.pr:hover{background:var(--surf2);color:var(--txt);}
.pr.act{background:rgba(232,83,58,.1);color:var(--red);border-left:2px solid var(--red);padding-left:20px;}
.pn{flex:1;white-space:normal;line-height:1.3;}
.nd{width:5px;height:5px;border-radius:50%;background:var(--org);flex-shrink:0;display:inline-block;margin-left:3px;vertical-align:middle;}
.bdg{font-size:9px;font-weight:700;border-radius:3px;padding:1px 5px;background:var(--surf2);color:var(--mut);flex-shrink:0;}
.bdg.red{background:rgba(232,83,58,.15);color:var(--red);}
.bdg.grn{background:rgba(60,185,122,.15);color:var(--grn);}

/* TABLE PANEL */
.tp{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.th{padding:8px 14px;background:var(--surf);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tt{font-weight:700;font-size:12px;}
.th-r{display:flex;align-items:center;gap:8px;}
.rc{font-size:10px;color:var(--mut);}

/* NOTES */
.nb{background:rgba(240,160,69,.07);border-bottom:1px solid rgba(240,160,69,.2);padding:8px 14px;display:none;align-items:flex-start;gap:9px;flex-shrink:0;position:relative;z-index:10000;}
.nb.open{display:flex;}
.ni{color:var(--org);font-size:13px;margin-top:2px;flex-shrink:0;}
.nl{font-size:9px;font-weight:700;color:var(--org);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.nta{display:block;width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(240,160,69,.4);border-radius:5px;color:var(--txt);font-size:12px;font-family:inherit;line-height:1.5;padding:5px 8px;resize:vertical;min-height:36px;max-height:100px;outline:none;pointer-events:auto;position:relative;z-index:10001;-webkit-user-select:text;user-select:text;cursor:text;}
.nta:focus{border-color:var(--org);background:rgba(255,255,255,.1);}
.nta::placeholder{color:var(--mut);}
.nsw{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.nsv{font-size:9px;color:var(--grn);opacity:0;transition:opacity .3s;}
.nsv.show{opacity:1;}

/* TABLE */
.ts{flex:1;overflow:auto;}
table{width:100%;border-collapse:collapse;font-size:11px;}
thead tr{background:var(--surf);position:sticky;top:0;z-index:10;}
thead th{padding:6px 10px;text-align:left;font-size:9px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--bdr);white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{color:var(--txt);}
tbody tr{border-bottom:1px solid var(--bdr);}
tbody tr:hover{background:var(--surf2);}
tbody td{padding:5px 10px;white-space:nowrap;}
.mut{color:var(--mut);}
.chip{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;text-transform:uppercase;}
.ch-p{background:rgba(240,160,69,.15);color:var(--org);}
.ch-o{background:rgba(232,83,58,.15);color:var(--red);}
.ch-s{background:rgba(60,185,122,.15);color:var(--grn);}
.ch-a{background:rgba(122,128,153,.15);color:var(--mut);}
.purch-chip{display:inline-block;background:rgba(60,185,122,.12);color:var(--grn);font-size:8px;font-weight:700;border-radius:3px;padding:1px 4px;text-transform:uppercase;}
.od{color:var(--red)!important;font-weight:700;}
.nr{text-align:right;font-variant-numeric:tabular-nums;}
.mono{font-family:monospace;font-size:10px;}
.trunc{max-width:140px;overflow:hidden;text-overflow:ellipsis;}
.nc{display:inline-block;background:rgba(240,160,69,.15);color:var(--org);font-size:9px;border-radius:3px;padding:1px 4px;cursor:default;}
.empty-msg{padding:40px;text-align:center;color:var(--mut);}
.overflow-n{padding:8px 14px;color:var(--mut);font-size:10px;border-top:1px solid var(--bdr);}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">IRWIN <span>BACKORDER REPORT</span></div>
    <a href="/" class="upload-link">&#8679; Upload New Report</a>
    <div class="spacer"></div>
    <div class="date-badge">Uploaded: {{ meta.uploaded_at }} &nbsp;|&nbsp; Report: {{ meta.report_date }}</div>
  </div>

  <div class="filters" id="filterBar">
    <span class="fl">Building</span>    <div class="ms-wrap" id="ms-building"></div>
    <span class="fl">Coordinator</span> <div class="ms-wrap" id="ms-coord"></div>
    <span class="fl">Planner</span>     <div class="ms-wrap" id="ms-planner"></div>
    <span class="fl">PO Status</span>   <div class="ms-wrap" id="ms-postatus"></div>
    <span class="fl">Line Status</span> <div class="ms-wrap" id="ms-linestatus"></div>
    <span class="fl">Part Type</span>
    <select class="native" id="fPartType" onchange="applyFilters()">
      <option value="">All Parts</option>
      <option value="purchased">Purchased Only</option>
      <option value="manufactured">Manufactured Only</option>
    </select>
    <span class="fl">Timing</span>
    <select class="native" id="fTiming" onchange="applyFilters()">
      <option value="overdue">Overdue Only</option>
      <option value="">All</option>
      <option value="today">Due Today</option>
      <option value="week">Due This Week</option>
    </select>
    <span class="fl">Search</span>
    <input type="text" id="fSearch" placeholder="Part #, Order #, Planner..." oninput="applyFilters()">
    <label style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mut);cursor:pointer;white-space:nowrap;user-select:none;">
      <input type="checkbox" id="fExcludeBuildAhead" onchange="applyFilters()" style="accent-color:var(--red);width:13px;height:13px;cursor:pointer;">
      Hide Build Ahead
    </label>
    <button class="btn btn-s" onclick="clearFilters()">Clear</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="body">
    <div class="pivot">
      <div class="ph"><span>By Coordinator</span><span id="pc" style="font-weight:400"></span></div>
      <div id="tree"></div>
    </div>
    <div class="tp">
      <div class="th">
        <span class="tt" id="title">Overdue Backorders</span>
        <div class="th-r">
          <span class="rc" id="rc"></span>
          <button class="btn btn-grn btn-sm" onclick="exportCSV()">&#8595; Export CSV</button>
        </div>
      </div>
      <!-- Notes modal at end of body -->
      <div class="ts"><div id="tbl"></div></div>
    </div>
  </div>
</div>

<div id="notesOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:99999;align-items:center;justify-content:center;">
  <div style="background:#1a1d27;border:1px solid #2e3350;border-radius:12px;padding:24px;width:520px;max-width:92vw;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.8);">
    <!-- Header -->
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;">
      <div style="flex:1;min-width:0;">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#f0a045;margin-bottom:4px;">Notes</div>
        <div id="notesTitle" style="font-size:13px;font-weight:600;color:#e8eaf0;max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
      </div>
      <button id="notesCloseBtn" style="background:none;border:none;color:#7a8099;font-size:24px;cursor:pointer;line-height:1;padding:0 4px;margin-left:10px;flex-shrink:0;">&times;</button>
    </div>
    <!-- Toggle: Project vs Line -->
    <div style="display:flex;gap:0;margin-bottom:14px;border:1px solid #2e3350;border-radius:6px;overflow:hidden;">
      <button id="noteTabProj" onclick="switchNoteTab('project')"
        style="flex:1;padding:7px;font-size:11px;font-weight:700;border:none;cursor:pointer;background:#e8533a;color:#fff;transition:all .15s;">
        &#128202; Project Note
      </button>
      <button id="noteTabLine" onclick="switchNoteTab('line')"
        style="flex:1;padding:7px;font-size:11px;font-weight:700;border:none;cursor:pointer;background:#22263a;color:#7a8099;transition:all .15s;">
        &#128196; Line Note
      </button>
    </div>
    <!-- Scope description -->
    <div id="noteScopeDesc" style="font-size:11px;color:#7a8099;margin-bottom:10px;"></div>
    <!-- Textarea -->
    <textarea id="notesText" rows="5"
      style="display:block;width:100%;background:#22263a;border:1px solid #f0a045;border-radius:6px;color:#e8eaf0;font-size:13px;font-family:system-ui,sans-serif;line-height:1.6;padding:10px 12px;resize:vertical;min-height:90px;box-sizing:border-box;outline:none;"
      placeholder="Add notes..."></textarea>
    <!-- Footer -->
    <div style="display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-top:14px;">
      <span id="notesSavedMsg" style="font-size:11px;color:#3cb97a;opacity:0;transition:opacity 0.3s;">&#10003; Saved</span>
      <button id="notesCloseBtn2" style="background:#22263a;color:#7a8099;border:1px solid #2e3350;border-radius:6px;padding:7px 18px;font-size:12px;font-weight:600;cursor:pointer;">Close</button>
      <button id="notesSaveBtn" style="background:#e8533a;color:#fff;border:none;border-radius:6px;padding:7px 18px;font-size:12px;font-weight:600;cursor:pointer;">Save Note</button>
    </div>
  </div>
</div>

<script>
const PARTS   = {{ parts_json|safe }};
const SUMMARY = {{ summary_json|safe }};
let notes     = {{ notes_json|safe }};

const TODAY = new Date().toISOString().slice(0,10);
let selCoord=null, selProj=null;
let sortColKey=9, sortDir=1;
let lastFiltered=[];
let autoTimer=null;
let noteTab='project';    // 'project' or 'line'
let noteLineKey=null;     // current line key when in line mode

// ── MULTI-SELECT ──────────────────────────────────────────────
// State: map of id -> { options:[], selected: Set (empty = all) }
const MS = {};
let openPanel = null;

function msCreate(id) {
  MS[id] = { options: [], selected: null };
  const wrap = document.getElementById(id);
  wrap.innerHTML = `
    <div class="ms-trigger" id="${id}-trigger">
      <span id="${id}-label">All</span>
      <span class="ms-arrow">&#9660;</span>
    </div>
    <div class="ms-panel" id="${id}-panel">
      <div class="ms-searchbox">
        <input type="text" placeholder="Search..." id="${id}-search">
      </div>
      <div class="ms-links">
        <span class="ms-link" id="${id}-all">Select all</span>
        <span class="ms-link" id="${id}-none">Clear all</span>
      </div>
      <div class="ms-list" id="${id}-list"></div>
    </div>`;

  // Toggle panel open/close — stopPropagation prevents document click from closing
  document.getElementById(`${id}-trigger`).addEventListener('click', function(e) {
    e.stopPropagation();
    if (openPanel && openPanel !== id) msClose(openPanel);
    const panel = document.getElementById(`${id}-panel`);
    if (panel.classList.contains('show')) {
      msClose(id);
    } else {
      panel.classList.add('show');
      openPanel = id;
      document.getElementById(`${id}-search`).focus();
    }
  });

  // Prevent ANY click inside panel from bubbling to document
  document.getElementById(`${id}-panel`).addEventListener('click', function(e) {
    e.stopPropagation();
  });

  document.getElementById(`${id}-search`).addEventListener('input', function() {
    msRender(id, this.value.toLowerCase());
  });

  document.getElementById(`${id}-all`).addEventListener('click', function() {
    MS[id].selected = null; // null = no filter = show all
    msRender(id);
    msUpdateLabel(id);
    applyFilters();
  });

  document.getElementById(`${id}-none`).addEventListener('click', function() {
    // Clear all = empty Set = all unchecked, user can then check specific items
    MS[id].selected = new Set();
    msRender(id);
    msUpdateLabel(id);
    applyFilters();
  });
}

function msClose(id) {
  document.getElementById(`${id}-panel`).classList.remove('show');
  document.getElementById(`${id}-search`).value = '';
  msRender(id); // re-render without search filter
  if (openPanel === id) openPanel = null;
}

function msPopulate(id, opts) {
  MS[id].options = opts;
  MS[id].selected = null;
  msRender(id);
  msUpdateLabel(id);
}

function msRender(id, search) {
  const {options, selected} = MS[id];
  const q = search !== undefined ? search : (document.getElementById(`${id}-search`).value || '').toLowerCase();
  const list = document.getElementById(`${id}-list`);
  const visible = q ? options.filter(o => o.toLowerCase().includes(q)) : options;

  if (!visible.length) {
    list.innerHTML = '<div class="ms-none">No options</div>';
    return;
  }

  list.innerHTML = visible.map(opt => {
    const checked = selected === null || selected.has(opt);
    const eid = `${id}-opt-${opt.replace(/[^a-zA-Z0-9]/g,'_')}`;
    return `<div class="ms-item">
      <input type="checkbox" id="${eid}" ${checked?'checked':''} data-val="${opt.replace(/"/g,'&quot;')}" data-id="${id}">
      <label for="${eid}">${opt}</label>
    </div>`;
  }).join('');

  // Attach change listeners
  list.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', function() {
      const val = this.getAttribute('data-val');
      const msId = this.getAttribute('data-id');
      const m = MS[msId];
      if (m.selected === null) {
        // Was "show all" — user unchecked one → switch to explicit, exclude that item
        m.selected = new Set(m.options);
        m.selected.delete(val);
      } else {
        if (this.checked) m.selected.add(val);
        else m.selected.delete(val);
        // If all items now checked → back to null (no filter)
        if (m.selected.size === m.options.length) m.selected = null;
      }
      msRender(msId);
      msUpdateLabel(msId);
      applyFilters();
    });
  });
}

function msUpdateLabel(id) {
  const selected = MS[id].selected;
  const options  = MS[id].options;
  const trigger  = document.getElementById(`${id}-trigger`);
  const label    = document.getElementById(`${id}-label`);
  if (!trigger || !label) return;
  if (selected === null) {
    label.textContent = 'All';
    trigger.classList.remove('has-filter');
  } else if (selected.size === 0) {
    label.textContent = 'None';
    trigger.classList.add('has-filter');
  } else if (selected.size === 1) {
    label.textContent = [...selected][0];
    trigger.classList.add('has-filter');
  } else {
    label.textContent = selected.size + ' selected';
    trigger.classList.add('has-filter');
  }
}

function msMatches(id, val) {
  const selected = MS[id].selected;
  if (selected === null) return true; // null = no filter, show all
  return selected.has(val || '');
}

function msReset(id) {
  MS[id].selected = null;
  document.getElementById(`${id}-search`).value = '';
  msRender(id);
  msUpdateLabel(id);
}

// Close panels when clicking outside
document.addEventListener('click', function() {
  if (openPanel) msClose(openPanel);
});

// ── NOTES ────────────────────────────────────────────────────
async function saveNotes() {
  await fetch('/api/notes', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(notes)
  });
}



function showNotesBar(proj) {
  if (!proj) return;
  if (openPanel) msClose(openPanel);
  selProj = proj;
  var overlay = document.getElementById('notesOverlay');
  document.getElementById('notesTitle').textContent = proj;
  document.getElementById('notesText').value = notes[proj] || '';
  document.getElementById('notesSavedMsg').style.opacity = '0';
  overlay.style.display = 'flex';
  setTimeout(function() { document.getElementById('notesText').focus(); }, 150);
}

function switchNoteTab(tab) {
  noteTab = tab;
  var projBtn = document.getElementById('noteTabProj');
  var lineBtn = document.getElementById('noteTabLine');
  var desc    = document.getElementById('noteScopeDesc');
  var ta      = document.getElementById('notesText');
  if (tab === 'project') {
    projBtn.style.background = '#e8533a'; projBtn.style.color = '#fff';
    lineBtn.style.background = '#22263a'; lineBtn.style.color = '#7a8099';
    desc.textContent = 'Applies to all lines in this project.';
    ta.value = notes[selProj] || '';
    ta.placeholder = 'Add a project-level note (e.g. 1 truck ships 6/22, 2 on 6/26)...';
  } else {
    lineBtn.style.background = '#e8533a'; lineBtn.style.color = '#fff';
    projBtn.style.background = '#22263a'; projBtn.style.color = '#7a8099';
    var lineLabel = noteLineKey ? noteLineKey.split(':::')[2]+' / Order '+noteLineKey.split(':::')[1] : 'this line';
    desc.textContent = 'Applies to this specific line only (' + lineLabel + ').';
    ta.value = (noteLineKey && notes[noteLineKey]) || '';
    ta.placeholder = 'Add a line-specific note...';
  }
  setTimeout(function() { ta.focus(); }, 50);
}

function openNotes(proj, coord, lineKey) {
  // lineKey format: "LINE:::orderno:::partno" (set when clicking a specific line)
  if (openPanel) msClose(openPanel);
  selProj = proj;
  selCoord = coord;
  noteLineKey = lineKey || null;

  document.getElementById('notesTitle').textContent = proj;
  document.getElementById('notesSavedMsg').style.opacity = '0';

  // Default to project tab; if lineKey provided, default to line tab
  switchNoteTab(lineKey ? 'line' : 'project');

  // Show/hide line tab based on whether a specific line was clicked
  var lineBtn = document.getElementById('noteTabLine');
  lineBtn.style.opacity = lineKey ? '1' : '0.4';
  lineBtn.style.cursor  = lineKey ? 'pointer' : 'default';
  lineBtn.title = lineKey ? '' : 'Click a specific line in the table to enable line notes';

  document.getElementById('notesOverlay').style.display = 'flex';
}

function closeNotesDlg() { document.getElementById('notesOverlay').style.display='none'; }

function saveNoteModal() {
  var v = document.getElementById('notesText').value.trim();
  if (noteTab === 'project') {
    if (!selProj) return;
    if (v) notes[selProj] = v; else delete notes[selProj];
  } else {
    if (!noteLineKey) return;
    if (v) notes[noteLineKey] = v; else delete notes[noteLineKey];
  }
  saveNotes().then(function() {
    var m = document.getElementById('notesSavedMsg');
    m.style.opacity = '1';
    setTimeout(function() { m.style.opacity = '0'; }, 2000);
    renderTree();
    renderTable();
  });
}

// ── FILTER INIT ───────────────────────────────────────────────
function initFilters() {
  ['ms-building','ms-coord','ms-planner','ms-postatus','ms-linestatus'].forEach(msCreate);
}

function populateFilters() {
  const B=new Set(), C=new Set(), P=new Set(), S=new Set(), L=new Set();
  Object.entries(PARTS).forEach(([key,pl]) => {
    C.add(key.split('|||')[0]);
    pl.forEach(p => {
      if(p[12]) B.add(p[12]);
      if(p[14]) P.add(p[14]);
      if(p[1])  S.add(p[1]);
      if(p[3])  L.add(p[3]);
    });
  });
  msPopulate('ms-building',   [...B].sort());
  msPopulate('ms-coord',      [...C].sort());
  msPopulate('ms-planner',    [...P].sort());
  msPopulate('ms-postatus',   [...S].sort());
  msPopulate('ms-linestatus', [...L].sort());
}

function clearFilters() {
  ['ms-building','ms-coord','ms-planner','ms-postatus','ms-linestatus'].forEach(msReset);
  document.getElementById('fPartType').value = '';
  document.getElementById('fTiming').value   = 'overdue';
  document.getElementById('fSearch').value   = '';
  document.getElementById('fExcludeBuildAhead').checked = false;
  selCoord=null; selProj=null;
  showNotesBar(null);
  applyFilters();
}

// ── FILTERING ─────────────────────────────────────────────────
function matchTiming(sd) {
  const t = document.getElementById('fTiming').value;
  const weekEnd = new Date(Date.now()+7*864e5).toISOString().slice(0,10);
  if (t==='overdue') return sd && sd < TODAY;
  if (t==='today')   return sd === TODAY;
  if (t==='week')    return sd && sd >= TODAY && sd <= weekEnd;
  return true;
}

function getFilteredParts(ignoreCoordProj) {
  const fpt = document.getElementById('fPartType').value;
  const fq  = document.getElementById('fSearch').value.toLowerCase();
  const out = [];
  Object.entries(SUMMARY).forEach(([coord, projs]) => {
    if (!msMatches('ms-coord', coord)) return;
    if (!ignoreCoordProj && selCoord && coord !== selCoord) return;
    Object.keys(projs).forEach(proj => {
      if (!ignoreCoordProj && selProj && proj !== selProj) return;
      (PARTS[coord+'|||'+proj]||[]).forEach(p => {
        if (!msMatches('ms-building',   p[12])) return;
        if (!msMatches('ms-planner',    p[14])) return;
        if (!msMatches('ms-postatus',   p[1]))  return;
        if (!msMatches('ms-linestatus', p[3]))  return;
        if (fpt==='purchased'    && !p[13]) return;
        if (fpt==='manufactured' &&  p[13]) return;
        if (!matchTiming(p[9])) return;
        if (document.getElementById('fExcludeBuildAhead').checked && proj.toUpperCase().includes('BUILD AHEAD')) return;
        if (fq && !((p[2]||'')+(p[0]||'')+proj+(p[14]||'')+(p[1]||'')).toLowerCase().includes(fq)) return;
        out.push({coord,proj,p});
      });
    });
  });
  return out;
}

function applyFilters() {
  // If ms-coord has multiple or all selected, clear left-panel single selection
  var cs = MS['ms-coord'] ? MS['ms-coord'].selected : null;
  if (cs !== null && cs.size !== 1) {
    selCoord = null; selProj = null;
  } else if (cs !== null && cs.size === 1) {
    selCoord = [...cs][0]; selProj = null;
  }
  lastFiltered = getFilteredParts(false);
  renderStats(); renderTree(); renderTable();
}

// ── STATS ─────────────────────────────────────────────────────
function renderStats() {
  let openQ=0,inv=0,val=0,od=0,dt=0;
  lastFiltered.forEach(({p}) => {
    openQ+=p[6]||0; inv+=p[7]||0; val+=p[8]||0;
    if(p[9]&&p[9]<TODAY)od++; if(p[9]===TODAY)dt++;
  });
  document.getElementById('stats').innerHTML=`
    <div class="sc"><div class="lbl">Lines</div><div class="val c-wht">${lastFiltered.length.toLocaleString()}</div><div class="sub">filtered</div></div>
    <div class="sc"><div class="lbl">Open Qty</div><div class="val c-wht">${Math.round(openQ).toLocaleString()}</div><div class="sub">units open</div></div>
    <div class="sc"><div class="lbl">Inventory</div><div class="val c-grn">${Math.round(inv).toLocaleString()}</div><div class="sub">on hand</div></div>
    <div class="sc"><div class="lbl">Unshipped Value</div><div class="val c-org">$${Math.round(val).toLocaleString()}</div><div class="sub">pending</div></div>
    <div class="sc"><div class="lbl">Overdue Lines</div><div class="val c-red">${od.toLocaleString()}</div><div class="sub">${dt} due today</div></div>`;
}

// ── PIVOT TREE ────────────────────────────────────────────────
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

function renderTree() {
  const treeRows = getFilteredParts(true);
  const tc={};
  treeRows.forEach(({coord,proj,p}) => {
    if(!tc[coord])tc[coord]={};
    if(!tc[coord][proj])tc[coord][proj]={cnt:0,open:0,inv:0};
    tc[coord][proj].cnt++; tc[coord][proj].open+=p[6]||0; tc[coord][proj].inv+=p[7]||0;
  });
  const coords=Object.keys(tc).sort();
  document.getElementById('pc').textContent=coords.length+' coords';
  let h='';
  coords.forEach(coord => {
    const projs=tc[coord], pks=Object.keys(projs).sort();
    const total=pks.reduce((s,p)=>s+projs[p].cnt,0);
    const isAct=selCoord===coord;
    h+=`<div class="cr">
      <div class="cn ${isAct?'act':''}" data-action="coord" data-coord="${esc(coord)}">
        <span>${coord}</span>
        <span style="color:var(--mut);font-weight:400;font-size:10px">&nbsp;(${total})</span>
        <span class="chv ${isAct?'open':''}">&#9658;</span>
      </div>
      <div class="proj-list ${isAct?'open':''}">
        <div class="pr ${isAct&&!selProj?'act':''}" data-action="proj" data-proj="" data-coord="${esc(coord)}">
          <span class="pn">All Projects</span><span class="bdg">${total}</span>
        </div>
        ${pks.map(proj=>{
          const d=projs[proj],short=proj.replace(/^S-|^T-/,'');
          return `<div class="pr ${selProj===proj&&selCoord===coord?'act':''}" data-action="proj" data-proj="${esc(proj)}" data-coord="${esc(coord)}">
            <span class="pn">${short}${(notes[proj]||Object.keys(notes).some(k=>k.startsWith('LINE:::')&&notes[k]&&PARTS[coord+'|||'+proj]&&PARTS[coord+'|||'+proj].some(p=>k===('LINE:::'+p[0]+':::'+p[2]))))?'<span class="nd"></span>':''}</span>
            <span class="bdg ${d.open>d.inv?'red':'grn'}">${d.cnt}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  document.getElementById('tree').innerHTML=h||'<div class="empty-msg">No results.</div>';
}

function toggleCoord(c) {
  if (selCoord === c) {
    selCoord = null;
    selProj = null;
    msReset('ms-coord');
  } else {
    selCoord = c;
    selProj = null;
    MS['ms-coord'].selected = new Set([c]);
    msUpdateLabel('ms-coord');
    msRender('ms-coord');
  }
  applyFilters();
}
function selectProj(proj,coord) {
  selCoord=coord; selProj=proj;
  applyFilters();
  // Note: showNotesBar now called via table row "note" cells directly
  // Left panel click just filters - use the note cell in table to edit notes
}

// ── TABLE ─────────────────────────────────────────────────────
const CHIP={Partial:'ch-p',Open:'ch-o',Scheduled:'ch-s',Allocated:'ch-a'};
const COLS=[
  {l:'Coordinator',k:'coord', fn:r=>`<td>${r.coord}</td>`},
  {l:'Project',    k:'proj',  fn:r=>`<td class="trunc" title="${r.proj}">${r.proj}</td>`},
  {l:'Building',   k:12,      fn:r=>`<td class="mut">${r.p[12]||''}</td>`},
  {l:'Order #',    k:0,       fn:r=>`<td class="mut">${r.p[0]}</td>`},
  {l:'PO No',      k:15,      fn:r=>`<td class="mut">${r.p[15]||''}</td>`},
  {l:'Part #',     k:2,       fn:r=>`<td class="mono">${r.p[2]}</td>`},
  {l:'Planner',    k:14,      fn:r=>`<td class="mut">${r.p[14]||'—'}</td>`},
  {l:'Type',       k:13,      fn:r=>`<td>${r.p[13]?'<span class="purch-chip">Purchased</span>':''}</td>`},
  {l:'PO Status',  k:1,       fn:r=>`<td class="mut trunc" title="${r.p[1]}">${r.p[1]}</td>`},
  {l:'Line',       k:3,       fn:r=>`<td><span class="chip ${CHIP[r.p[3]]||''}">${r.p[3]}</span></td>`},
  {l:'Ord Qty',    k:4,       fn:r=>`<td class="nr">${fmt(r.p[4])}</td>`},
  {l:'Shipped',    k:5,       fn:r=>`<td class="nr">${fmt(r.p[5])}</td>`},
  {l:'Open',       k:6,       fn:r=>`<td class="nr">${fmt(r.p[6])}</td>`},
  {l:'Inventory',  k:7,       fn:r=>`<td class="nr">${fmt(r.p[7])}</td>`},
  {l:'Value $',    k:8,       fn:r=>`<td class="nr">${fmtC(r.p[8])}</td>`},
  {l:'Ship Date',  k:9,       fn:r=>`<td class="${r.p[9]&&r.p[9]<TODAY?'od':'mut'}">${r.p[9]||'—'}</td>`},
  {l:'Due Date',   k:10,      fn:r=>`<td class="mut">${r.p[10]||'—'}</td>`},
  {l:'Notes', k:'notes', fn:r=>{
    const lineKey='LINE:::'+r.p[0]+':::'+r.p[2];
    const projNote=notes[r.proj]||'';
    const lineNote=notes[lineKey]||'';
    const hasNote=projNote||lineNote;
    const display=lineNote?'&#128196; '+lineNote.substring(0,20)+(lineNote.length>20?'...':''):
                  projNote?'&#128202; '+projNote.substring(0,20)+(projNote.length>20?'...':''):'+ note';
    return `<td><span class="note-btn"
      data-proj="${r.proj.replace(/"/g,'&quot;')}"
      data-coord="${r.coord.replace(/"/g,'&quot;')}"
      data-linekey="${lineKey.replace(/"/g,'&quot;')}"
      style="cursor:pointer;padding:2px 8px;border-radius:4px;display:inline-block;font-size:10px;
             background:${hasNote?'rgba(240,160,69,.2)':'rgba(255,255,255,.05)'};
             color:${hasNote?'#f0a045':'#7a8099'};"
      >${display}</span></td>`;
  }},
];

function fmt(v){const n=parseFloat(v);return isNaN(n)?'—':Math.round(n).toLocaleString();}
function fmtC(v){const n=parseFloat(v);return isNaN(n)?'—':'$'+Math.round(n).toLocaleString();}

function renderTable() {
  const rows=[...lastFiltered].sort((a,b)=>{
    const col=COLS.find(c=>c.k===sortColKey);
    let av,bv;
    if(!col||col.k==='coord'){av=a.coord;bv=b.coord;}
    else if(col.k==='proj'){av=a.proj;bv=b.proj;}
    else if(col.k==='notes'){av=notes[a.proj]||'';bv=notes[b.proj]||'';}
    else{av=a.p[col.k]??'';bv=b.p[col.k]??'';}
    const an=parseFloat(av),bn=parseFloat(bv);
    if(!isNaN(an)&&!isNaN(bn))return(an-bn)*sortDir;
    return String(av).localeCompare(String(bv))*sortDir;
  });

  const ft=document.getElementById('fTiming').value;
  const fpt=document.getElementById('fPartType').value;
  let title=selProj?selProj:selCoord?selCoord+' — All Projects':(ft==='overdue'?'Overdue Backorders':'All Backorders');
  if(fpt==='purchased')title+=' · Purchased Only';
  if(fpt==='manufactured')title+=' · Manufactured Only';
  document.getElementById('title').textContent=title;
  document.getElementById('rc').textContent=rows.length.toLocaleString()+' lines';

  const arr=d=>d===1?'↑':'↓';
  const thead='<thead><tr>'+COLS.map(c=>
    `<th onclick="setSort(${JSON.stringify(c.k)})">${c.l}<span style="margin-left:2px;opacity:.5">${sortColKey===c.k?arr(sortDir):''}</span></th>`
  ).join('')+'</tr></thead>';
  const show=rows.slice(0,500);
  const tbody='<tbody>'+show.map(r=>`<tr>${COLS.map(c=>c.fn(r)).join('')}</tr>`).join('')+'</tbody>';
  const overflow=rows.length>500?`<div class="overflow-n">Showing 500 of ${rows.length} — filter to narrow.</div>`:'';
  document.getElementById('tbl').innerHTML=`<table>${thead}${tbody}</table>`+overflow;
}

function setSort(k){
  if(sortColKey===k)sortDir*=-1; else{sortColKey=k;sortDir=1;}
  renderTable();
}

// ── EXPORT ────────────────────────────────────────────────────
function exportCSV() {
  const headers=['Coordinator','Project','Building','Order #','PO No','Part #','Planner','Type','PO Status','Line Status','Ord Qty','Shipped Qty','Open Qty','Inventory','Value $','Ship Date','Due Date','Notes'];
  const esc=v=>{const s=String(v==null?'':v);return(s.includes(',')||s.includes('"')||s.includes('\n'))?`"${s.replace(/"/g,'""')}"`:`${s}`;};
  const lines=[headers.map(esc).join(',')];
  lastFiltered.forEach(({coord,proj,p})=>{
    const lineKey='LINE:::'+p[0]+':::'+p[2];
    const lineNote=notes[lineKey]||'';
    const projNote=notes[proj]||'';
    // Export line note if exists, otherwise project note, with prefix so you know which type
    const noteVal=lineNote?'[Line] '+lineNote : projNote?'[Project] '+projNote : '';
    lines.push([coord,proj,p[12]||'',p[0],p[15]||'',p[2],p[14]||'',p[13]?'Purchased':'Manufactured',
      p[1],p[3],p[4]||0,p[5]||0,p[6]||0,p[7]||0,p[8]||0,p[9]||'',p[10]||'',noteVal].map(esc).join(','));
  });
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`backorder_{{ meta.report_date }}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── INIT ──────────────────────────────────────────────────────
initFilters();
populateFilters();
applyFilters();

// Wire notes overlay buttons
document.getElementById('notesCloseBtn').addEventListener('click', function() {
  document.getElementById('notesOverlay').style.display = 'none';
});
document.getElementById('notesCloseBtn2').addEventListener('click', function() {
  document.getElementById('notesOverlay').style.display = 'none';
});
document.getElementById('notesSaveBtn').addEventListener('click', saveNoteModal);
// Close on backdrop click
document.getElementById('notesOverlay').addEventListener('click', function(e) {
  if (e.target === this) this.style.display = 'none';
});
// Ctrl+Enter to save
document.getElementById('notesText').addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); saveNoteModal(); }
});

// Event delegation for note buttons in table
document.getElementById('tbl').addEventListener('click', function(e) {
  var btn = e.target.closest('.note-btn');
  if (!btn) return;
  var proj    = btn.getAttribute('data-proj');
  var coord   = btn.getAttribute('data-coord');
  var lineKey = btn.getAttribute('data-linekey');
  openNotes(proj, coord, lineKey);
});

// Event delegation for coordinator tree clicks
document.getElementById('tree').addEventListener('click', function(e) {
  var coordEl = e.target.closest('[data-action="coord"]');
  var projEl  = e.target.closest('[data-action="proj"]');
  if (coordEl) {
    var c = coordEl.getAttribute('data-coord');
    toggleCoord(c);
  } else if (projEl) {
    var proj  = projEl.getAttribute('data-proj');
    var coord = projEl.getAttribute('data-coord');
    selectProj(proj || null, coord);
  }
});
</script>
